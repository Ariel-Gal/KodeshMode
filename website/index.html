<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KodeshMode - Shabbat for your Garmin Watch</title>
  <meta name="description" content="Hebrew date, parasha, zmanim, and a clean Shabbat-aware display beautifully rendered on Garmin devices." />
  <link rel="icon" type="image/png" href="./images/brand/favicon-32.png" />
  
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: https://corsproxy.io https://avatars.githubusercontent.com; connect-src 'self' https://api.github.com https://corsproxy.io https://raw.githubusercontent.com ws: wss:; style-src 'self' 'unsafe-inline';" />
  
  <style>
    :root {
      --bg-deep: #050811;
      --accent: #4f86f7;
      --accent-glow: rgba(79, 134, 247, 0.4);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --font-en: 'Outfit', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-deep);
      background-image: radial-gradient(circle at 50% 40%, #0d162a 0%, var(--bg-deep) 70%);
      color: var(--text-main);
      font-family: var(--font-en);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Cinematic Fade-In Animations */
    @keyframes fadeInScale {
      0% { opacity: 0; transform: scale(0.95) translateY(20px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    
    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(15px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); filter: drop-shadow(0 0 30px var(--accent-glow)); }
      50% { transform: translateY(-10px); filter: drop-shadow(0 0 50px rgba(79, 134, 247, 0.6)); }
    }

    .splash-container {
      text-align: center;
      z-index: 2;
      max-width: 600px;
      padding: 2rem;
    }

    .splash-hero {
      position: relative;
      width: 280px;
      height: 280px;
      margin: 0 auto 2rem;
      animation: fadeInScale 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .splash-hero img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 0 30px var(--accent-glow));
      animation: float 6s ease-in-out infinite;
    }

    .splash-hero::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 180px;
      height: 180px;
      background: var(--accent);
      filter: blur(80px);
      transform: translate(-50%, -50%);
      z-index: -1;
      opacity: 0.3;
    }

    .splash-title {
      font-size: 3.5rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #ffffff 0%, #a5c3ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0;
      animation: fadeIn 1s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
    }

    .splash-subtitle {
      font-size: 1.25rem;
      font-weight: 400;
      color: var(--text-muted);
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeIn 1s cubic-bezier(0.16, 1, 0.3, 1) 0.8s forwards;
    }

    .btn-enter {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--text-main);
      color: var(--bg-deep);
      padding: 1rem 2.5rem;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
      opacity: 0;
      animation: fadeIn 1s cubic-bezier(0.16, 1, 0.3, 1) 1.2s forwards;
    }

    .btn-enter:hover {
      transform: translateY(-3px) scale(1.05);
      background: #ffffff;
      box-shadow: 0 10px 25px rgba(255, 255, 255, 0.2);
    }
    
    .btn-enter svg {
      transition: transform 0.3s ease;
    }
    
    .btn-enter:hover svg {
      transform: translateX(4px);
    }

    .stars {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MDAiIGhlaWdodD0iNDAwIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSIxIiBmaWxsPSIjZmZmIiBvcGFjaXR5PSIwLjMiLz48Y2lyY2xlIGN4PSIyMDAiIGN5PSIxNTAiIHI9IjEiIGZpbGw9IiNmZmYiIG9wYWNpdHk9IjAuNSIvPjxjaXJjbGUgY3g9IjM1MCIgY3k9IjMwMCIgcj0iMSIgZmlsbD0iI2ZmZiIgb3BhY2l0eT0iMC4yIi8+PGNpcmNsZSBjeD0iMTAwIiBjeT0iMzUwIiByPSIxIiBmaWxsPSIjZmZmIiBvcGFjaXR5PSIwLjQiLz48L3N2Zz4=') repeat;
      opacity: 0.5;
      z-index: 0;
    }

    @media (max-width: 600px) {
      .splash-title {
        font-size: 2.5rem;
      }
      .splash-subtitle {
        font-size: 1.1rem;
      }
      .splash-hero {
        width: 220px;
        height: 220px;
      }
    }
  </style>
</head>
<body>

  <div class="stars"></div>

  <div class="splash-container">
    <div class="splash-hero">
      <img src="./images/showcase/venu-gold-shabbat-view.webp" alt="KodeshMode on Venu" />
    </div>
    
    <h1 class="splash-title">KodeshMode</h1>
    <p class="splash-subtitle">Premium Shabbat Mode for Your Garmin Watch</p>
    
    <a href="./home.html" class="btn-enter">
      Enter Experience
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </a>
  </div>

</body>
</html>
